<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyecto Integrador TI</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }
header { background:#1e3a8a; color:white; padding:20px; text-align:center; }
.container { max-width:1000px; margin:auto; padding:20px; }
.card { background:white; padding:20px; margin:15px 0; border-radius:10px; }
textarea,input,select { width:100%; padding:10px; margin-top:8px; }
button { background:#1e3a8a; color:white; padding:10px; border:none; margin-top:10px; cursor:pointer; }
.hidden{display:none;}
.locked{opacity:0.5; pointer-events:none;}
</style>
</head>

<body>

<header>
<h2>Proyecto Integrador: Unidad Informática</h2>
</header>

<div class="container">

<select id="rol" onchange="cargarRol()">
<option value="">Selecciona rol</option>
<option value="sebastian">Estrategia</option>
<option value="partida">Negocio</option>
<option value="yael">Infraestructura</option>
<option value="johan">Seguridad</option>
<option value="omar">Omar - Auditor</option>
</select>

<!-- ESTRATEGIA -->
<div id="sebastian" class="card hidden">
<h3>Estrategia</h3>
<input id="s1" placeholder="Problema del caso">
<input id="s2" placeholder="Objetivo medible">
<textarea id="s3" placeholder="Impacto económico"></textarea>
<textarea id="s4" placeholder="Organización de roles"></textarea>
<textarea id="s5" placeholder="Uso de IA"></textarea>
<button onclick="guardar()">Guardar</button>
</div>

<!-- NEGOCIO -->
<div id="partida" class="card hidden">
<h3>Negocio</h3>
<textarea id="p1" placeholder="Impacto en negocio"></textarea>
<textarea id="p3" placeholder="Costo-beneficio"></textarea>
<button onclick="guardar()">Guardar</button>
</div>

<!-- INFRA -->
<div id="yael" class="card hidden">
<h3>Infraestructura</h3>
<input id="y1" placeholder="Infraestructura propuesta">
<textarea id="y2" placeholder="Justificación técnica"></textarea>
<button onclick="guardar()">Guardar</button>
</div>

<!-- SEGURIDAD -->
<div id="johan" class="card hidden">
<h3>Seguridad</h3>
<input id="j1" placeholder="Riesgo principal">
<textarea id="j2" placeholder="Controles de seguridad"></textarea>
<button onclick="guardar()">Guardar</button>
</div>

<!-- VALIDACION CRUZADA -->
<div class="card">
<h3>Validación Cruzada</h3>
<textarea id="v1" placeholder="Errores detectados"></textarea>
<textarea id="v2" placeholder="Mejoras"></textarea>
<textarea id="v3" placeholder="Evaluación crítica"></textarea>
<button onclick="guardar()">Guardar validación</button>
</div>

<!-- OMAR -->
<div id="omar" class="card hidden">
<h3>Omar - Auditor</h3>
<textarea id="o1" placeholder="Errores del sistema"></textarea>
<textarea id="o2" placeholder="Conflictos entre áreas"></textarea>
<textarea id="o3" placeholder="Riesgos críticos"></textarea>
<textarea id="o4" placeholder="Recomendación"></textarea>
<label><input type="checkbox" id="o5"> Aprobar sistema</label>
<button onclick="validarOmar()">Validar</button>
</div>

<!-- INTEGRACION -->
<div id="integracion" class="card locked">
<h3>Integración Final</h3>
<textarea id="f1" placeholder="Solución integral"></textarea>
<textarea id="f2" placeholder="Decisión final"></textarea>
<textarea id="f3" placeholder="Impacto"></textarea>
<textarea id="f4" placeholder="Riesgos"></textarea>
<textarea id="f5" placeholder="Defensa"></textarea>
<button onclick="guardar()">Guardar</button>
</div>

<div class="card">
<button onclick="exportar()">Descargar JSON</button>
</div>

</div>

<script>

function cargarRol(){
let rol=document.getElementById("rol").value;
document.querySelectorAll(".card").forEach(c=>{
if(c.id && c.id!="integracion") c.classList.add("hidden");
});
if(rol) document.getElementById(rol).classList.remove("hidden");
cargarDatos();
}

function guardar(){
document.querySelectorAll("textarea,input").forEach(t=>{
localStorage.setItem(t.id, t.type==="checkbox"?t.checked:t.value);
});
actualizar();
}

function cargarDatos(){
document.querySelectorAll("textarea,input").forEach(t=>{
if(t.type==="checkbox"){
t.checked=localStorage.getItem(t.id)==="true";
}else{
t.value=localStorage.getItem(t.id)||"";
}
});
actualizar();
}

function actualizar(){

let v1=(localStorage.getItem("v1")||"").length>10;
let v2=(localStorage.getItem("v2")||"").length>10;
let v3=(localStorage.getItem("v3")||"").length>10;

let validacionOK = v1 && v2 && v3;
let omarOK = localStorage.getItem("omar_aprobado")==="true";

/* BLOQUEO REAL */
let desbloquear = validacionOK && omarOK;

document.getElementById("integracion").classList.toggle("locked", !desbloquear);
}

/* OMAR INTELIGENTE */
function validarOmar(){

// primero exige validación cruzada
let v1=(localStorage.getItem("v1")||"").length>10;
let v2=(localStorage.getItem("v2")||"").length>10;
let v3=(localStorage.getItem("v3")||"").length>10;

if(!(v1 && v2 && v3)){
alert("No puedes validar sin validación cruzada previa");
return;
}

// campos Omar
let campos=["o1","o2","o3","o4"];
for(let c of campos){
if((document.getElementById(c).value||"").length<10){
alert("Análisis insuficiente");
return;
}
}

if(!document.getElementById("o5").checked){
alert("Debes aprobar el sistema");
return;
}

// coherencia
let score=0;
["s1","s2","s3","p1","p3","y1","y2","j1","j2"].forEach(id=>{
if((localStorage.getItem(id)||"").length>5) score++;
});

if(score<6){
alert("Sistema rechazado por inconsistencias");
localStorage.setItem("omar_aprobado","false");
return;
}

localStorage.setItem("omar_aprobado","true");
alert("Sistema aprobado correctamente");
actualizar();
}

function exportar(){
let data={};
document.querySelectorAll("textarea,input").forEach(t=>{
data[t.id]=t.type==="checkbox"?t.checked:t.value;
});
let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="proyecto_integrador.json";
a.click();
}

</script>

</body>
</html>
